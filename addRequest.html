<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <title>Добавление заявки</title>
</head>
<body>
    <header class="d-flex flex-wrap align-items-center py-3 mb-4">
        <div class="d-flex align-items-center margin" style="margin-left: 200px;">
            <img class="logo me-2" src="images/Лого.png" alt="Logo" />
            <h3 class="m-0">Корочки.есть</h3>
        </div>

        <ul class="nav ms-auto" style="margin-right: 200px;">
            <li class="nav-item">
                <a class="nav-link" href="login.html">Выйти</a>
            </li>
        </ul>
    </header>
    <div class="container">
        <div class="window">
            <h2 class="text-white py-3">Создание новой заявки</h2>
            <form action="requests.html" method="post">
                <div class="mb-3">
                    <label>Наименование курса</label>
                    <input class="form-control form-control-lg text-white" id="name" required />
                </div>

                <div class="mb-3">
                    <label>Дата начала обучения</label>
                    <input type="date" class="form-control form-control-lg text-white" id="password" required />
                </div>

                <div class="mb-3">
                    <label>Способ оплаты</label>
                    <select id="payMethod" class="form-select mb-3 bg-black text-white" aria-label="Способ оплаты" required>
                        <option selected>Наличными</option>
                        <option value="1">Переводом</option>
                    </select>
                </div>
                <button class="btn btn-primary btn-lg w-100 mb-3" type="submit">Создать</button>
            </form>
            <a href="requests.html">Назад</a>
        </div>
    </div>
</body>
</html>
