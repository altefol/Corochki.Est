<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <title>Регистрация</title>
</head>
<body>
    <header class="d-flex flex-wrap align-items-center py-3 mb-4">
        <div class="d-flex align-items-center margin" style="margin-left: 200px;">
            <img class="logo me-2" src="images/Лого.png" alt="Logo" />
            <h3 class="m-0">Корочки.есть</h3>
        </div>
    </header>
    <div class="container">
        <div class="window">
            <h2 class="text-white">Регистрация</h2>
            <form action="login.html" method="post">
                <div class="mb-3">
                    <label>Логин</label>
                    <input class="form-control form-control-lg text-white" id="login" required />
                </div>

                <div class="mb-3">
                    <label>Пароль</label>
                    <input type="password" class="form-control form-control-lg text-white" id="password" required />
                </div>

                <div class="mb-3">
                    <label>ФИО</label>
                    <input type="text" class="form-control form-control-lg text-white" id="fio" required />
                </div>

                <div class="mb-3">
                    <label>Телефон</label>
                    <input type="tel" class="form-control form-control-lg text-white" id="tel" placeholder="+7-XXX-XXX-XX-XX" maxlength="16" required />
                </div>

                <div class="mb-3">
                    <label>Электронная почта</label>
                    <input type="email" class="form-control form-control-lg text-white" id="email" placeholder="example@email.com" required />
                </div>
                <button class="btn btn-primary btn-lg w-100 mb-3" type="submit">Регистрация</button>
                <p class="fs-6 fw-lighter text-white-50">Уже есть аккаунт? <a href="login.html">Войти</a></p>
            </form>
        </div>
    </div>
</body>
</html>
